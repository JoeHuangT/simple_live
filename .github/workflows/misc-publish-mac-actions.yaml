name: misc-publish-mac-actions

on:
  workflow_dispatch:
  # push:
  #   tags:
  #     - "dev_v*"

jobs:
  # 打包Android、iOS、Mac
  build-mac-ios-android:
    runs-on: macos-15

    permissions:
      contents: write

    steps:
      - name: 签出代码
        uses: actions/checkout@v4
        # 这里不需要 with: ref，它会自动检出当前分支的代码
      
      # APK签名设置
      - name: Download Android keystore
        id: android_keystore
        uses: timheuer/base64-to-file@v1.2
        with:
          fileName: keystore.jks
          encodedString: ${{ secrets.TV_KEYSTORE_BASE64 }}
      - name: Create key.properties
        run: |
          echo "storeFile=${{ steps.android_keystore.outputs.filePath }}" > simple_live_app/android/key.properties
          echo "storePassword=${{ secrets.TV_STORE_PASSWORD }}" >> simple_live_app/android/key.properties
          echo "keyPassword=${{ secrets.TV_KEY_PASSWORD }}" >> simple_live_app/android/key.properties
          echo "keyAlias=${{ secrets.TV_KEY_ALIAS }}" >> simple_live_app/android/key.properties

      # 设置JAVA环境
      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"
      
      - name: Clean Flutter
        run: |
          cd simple_live_app
          # 1. 锁定不包含 Vision Pro 报错代码的版本
          sed -i '' 's/connectivity_plus:.*/connectivity_plus: 6.1.1/g' pubspec.yaml
          sed -i '' 's/device_info_plus:.*/device_info_plus: 11.1.0/g' pubspec.yaml
          
          # 2. 彻底清理环境
          flutter clean
          flutter pub get

      # 设置Flutter
      - name: Flutter action
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true

      # 打开MAC Desktop支持
      - name: Enable Flutter Desktop
        run: flutter config --enable-macos-desktop

      # 更新Flutter的packages
      - name: Restore packages
        run: |
          cd simple_live_app
          flutter pub get

      # 安装appdmg npm install -g appdmg
      - name: Install appdmg
        run: npm install -g appdmg

      # 设置flutter_distributor环境
      - name: Install flutter_distributor
        run: dart pub global activate flutter_distributor      

      # # 打包APK
      # - name: Build APK
      #   run: |
      #     cd simple_live_app
      #     flutter build apk --release --split-per-abi

      # #上传Artifacts
      # - name: Upload APK to Artifacts
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: android
      #     path: |
      #       simple_live_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
      #       simple_live_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
      #       simple_live_app/build/app/outputs/flutter-apk/app-x86_64-release.apk

      #打包iOS
      - name: Build IPA
        run: |
          # 3. 强制更新 iOS 配置
          cd ios
          rm -rf Pods
          rm -rf Podfile.lock
          pod install --repo-update
          
          # 4. 再次回到目录进行构建
          cd ..
          flutter build ios --release --no-codesign
        # run: |
        #   cd simple_live_app
        #   flutter build ios --release --no-codesign

      #创建未签名ipa
      - name: Create IPA
        run: |
          cd simple_live_app
          mkdir build/ios/iphoneos/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/Runner.app
          cd build/ios/iphoneos/
          zip -q -r ios_no_sign.ipa Payload
          cd ../../..

      # 上传IPA至Artifacts
      - name: Upload IPA to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios
          path: |
            simple_live_app/build/ios/iphoneos/ios_no_sign.ipa

      # 打包MAC
      - name: Build MacOS
        run: |
          cd simple_live_app
          flutter_distributor package --platform macos --targets dmg,zip --skip-clean

      # 上传MAC至Artifacts
      - name: Upload MacOS to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac
          path: |
            simple_live_app/build/dist/*/*.dmg
            simple_live_app/build/dist/*/*.zip
      #完成
      - run: echo "🍏 This job's status is ${{ job.status }}."
